name: Github Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage only the rendered documentation
        run: |
          set -euo pipefail
          mkdir -p site/documentation
          cp documentation/SPECIFICATIONS_COMPONENTS_OVERVIEW.svg site/documentation/
          cp documentation/SPECIFICATIONS_COMPONENTS_NAVIGATE_FULL.html site/documentation/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
