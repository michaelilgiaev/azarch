name: Pull Specifications

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: specifications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate specification artifacts
        run: scripts/pull_specifications.sh

      - name: Commit updated specifications if anything changed
        run: |
          set -euo pipefail
          if git diff --quiet -- documentation/; then
            exit 0
          fi
          git config user.name  "michaelilgiaev"
          git config user.email "michaelilgiaev@gmail.com"
          git add documentation/
          git commit -m "Regenerate specifications [skip ci]"
          git push
