name: Pull Specifications

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: specifications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate specification artifacts
        run: scripts/pull_specifications.sh

      - name: Commit updated specifications if anything changed
        run: |
          set -euo pipefail
          if git diff --quiet -- documentation/; then
            exit 0
          fi
          git add documentation/
          # Force BOTH author and committer to a human so the commit is never
          # attributed to github-actions[bot] on the contributor graph. Setting
          # only git config user.* is not enough: the runner stamps the committer
          # from the token identity, so the bot reappears. These env vars write
          # the author AND committer fields into the object itself before push.
          GIT_AUTHOR_NAME="michaelilgiaev" \
          GIT_AUTHOR_EMAIL="michaelilgiaev@gmail.com" \
          GIT_COMMITTER_NAME="michaelilgiaev" \
          GIT_COMMITTER_EMAIL="michaelilgiaev@gmail.com" \
          git commit -m "Regenerate specifications [skip ci]"
          git push
