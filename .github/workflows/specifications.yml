name: Check specifications

# Verifies the committed Az'arch specification docs (Markdown, SVG, HTML map,
# full listing) are up to date with the live Arch Linux package databases.
#
# This does NOT commit anything back. You regenerate specs locally with
# scripts/pull_specifications.sh and commit the result yourself; CI just fails
# the run if the committed artifacts are stale, so nothing races your pushes.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

# Read-only: this workflow only checks, it never pushes.
permissions:
  contents: read

# If a new push lands while a run is in flight, cancel the older run -- we only
# ever care about regenerating from the newest state.
concurrency:
  group: specifications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate specification artifacts
        run: scripts/pull_specifications.sh

      - name: Fail if committed specifications are stale
        run: |
          set -euo pipefail
          # CI does NOT commit. It regenerates into the working tree (the step
          # above) and fails if the committed artifacts differ -- i.e. someone
          # pushed without running scripts/pull_specifications.sh first. This
          # keeps the committed specs honest without any bot pushing back to the
          # branch (which used to race real pushes and cause rejections).
          if git diff --quiet -- \
              documentation/SPECIFICATIONS_GENERAL.md \
              documentation/SPECIFICATIONS_COMPONENTS_OVERVIEW.svg \
              documentation/SPECIFICATIONS_COMPONENTS_NAVIGATE_FULL.html \
              documentation/SPECIFICATIONS_COMPONENTS_FULL.txt; then
            echo "Specifications are up to date."
            exit 0
          fi

          echo "::error::Committed specifications are stale. Run" \
               "scripts/pull_specifications.sh locally and commit the result." >&2
          git --no-pager diff --stat -- documentation/ >&2
          exit 1
