#
# Self-contained Arch Linux config used ONLY by cache-pkgs.sh to download
# the packages that get baked into the ISO's offline install repo.
#
# Why this file exists: compile.sh may run on a non-Arch host (e.g. Manjaro).
# The default pacman config (/etc/pacman.conf) on such a host points at the
# wrong distro's repos/mirrors and lacks Arch-only packages (archinstall,
# reflector, ...), which aborts the build. This config is fully host-independent:
# it hard-codes Arch's official mirrors and never Includes the host mirrorlist,
# so the download step behaves identically on Manjaro, real Arch, and Docker.
#
# SigLevel = Never here only affects the *download* step. Final package trust is
# re-established at pacstrap time against the file:// [pacstrap-easyarch-repo],
# which already uses SigLevel = Never. This avoids depending on the host keyring
# (a Manjaro keyring does not trust Arch package signatures).
#
[options]
Architecture      = x86_64
HoldPkg           = pacman glibc
CheckSpace
ParallelDownloads = 5
SigLevel          = Never
LocalFileSigLevel = Never
# Intentionally NO 'DownloadUser = alpm': pacman runs as root under sudo here and
# writes into root-owned scratch dirs, so the privilege-dropped alpm download
# helper would fail with permission errors. Running the fetch as root avoids that
# and removes any dependency on the host having an 'alpm' user.

[core]
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch

[extra]
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch

[multilib]
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
